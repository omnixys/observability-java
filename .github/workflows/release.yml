name: Release & Publish (Java)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:

  release:
    runs-on: ubuntu-latest

    outputs:
      released: ${{ steps.semantic.outputs.released }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: |
          npm install -g semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/exec \
            conventional-changelog-conventionalcommits

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release | tee log.txt
          grep -q "Published release" log.txt && echo "released=true" >> $GITHUB_OUTPUT || echo "released=false" >> $GITHUB_OUTPUT
      


  publish:
    runs-on: ubuntu-latest
    needs: release

    # 🔥 only run if new release was created
    if: needs.release.outputs.released == 'true'

    steps:
      - name: Checkout (latest release commit)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 👉 wichtig: neuen Commit ziehen (Version updated)
      - name: Pull latest changes
        run: git pull origin main

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven


      - name: Setup Maven auth
        run: |
          mkdir -p ~/.m2
          cat <<EOF > ~/.m2/settings.xml
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Build & Publish
        run: mvn -B clean deploy -DskipTests